name: CI Pipeline

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  find-modified-challenges:
    if: github.base_ref == 'dev' && startsWith(github.head_ref, 'feature/')
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.modified.outputs.dirs }}
    steps:
      - uses: actions/checkout@v4
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
      - name: Find modified challenge directories
        id: modified
        run: |
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          modified_dirs=$(echo "$changed_files" | grep -E '.*/.*/(verify\.py|tests/)' | awk -F/ '{print $1 "/" $2}' | sort -u | jq -R . | jq -s .)
          echo "dirs=$modified_dirs" >> $GITHUB_OUTPUT

  selective-tests:
    needs: find-modified-challenges
    if: github.base_ref == 'dev' && startsWith(github.head_ref, 'feature/') && fromJson(needs.find-modified-challenges.outputs.dirs) != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        challenge: ${{ fromJson(needs.find-modified-challenges.outputs.dirs) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy tensorflow
      - name: Run tests
        run: |
          cd ${{ matrix.challenge }}
          if [ -d "tests" ]; then
            pytest tests/
          fi

  find-all-challenges:
    if: github.base_ref == 'main' && startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.all-dirs.outputs.dirs }}
    steps:
      - uses: actions/checkout@v4
      - name: Find all challenge directories
        id: all-dirs
        run: |
          all_dirs=$(find . -type d -name tests | xargs dirname | sed 's|^\./||' | jq -R . | jq -s .)
          echo "dirs=$all_dirs" >> $GITHUB_OUTPUT

  full-tests:
    needs: find-all-challenges
    if: github.base_ref == 'main' && startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        challenge: ${{ fromJson(needs.find-all-challenges.outputs.dirs) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy tensorflow
      - name: Run tests
        run: |
          cd ${{ matrix.challenge }}
          pytest tests/