name: CI Pipeline for Pull Requests

on:
  pull_request:
    branches: [dev, main]

jobs:
  test-feature-to-dev:
    if: github.base_ref == 'dev' && startsWith(github.head_ref, 'feature/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pytest
        run: pip install pytest

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45

      - name: Find modified challenge directories
        id: mod-challenges
        run: |
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          unique_challenges=""
          for file in $changed_files; do
            parts=(${file//\// })
            if [ ${#parts[@]} -ge 2 ]; then
              challenge_path="${parts[0]}/${parts[1]}"
              if [[ ! " $unique_challenges " =~ " $challenge_path " ]]; then
                unique_challenges="$unique_challenges $challenge_path"
              fi
            fi
          done
          echo "challenges=$unique_challenges" >> $GITHUB_OUTPUT

      - name: Run tests for modified challenges
        run: |
          set -e
          for challenge in ${{ steps.mod-challenges.outputs.challenges }}; do
            if [ -d "$challenge/tests" ]; then
              echo "Running tests for $challenge"
              (cd "$challenge" && pytest tests/)
            fi
          done

  test-release-to-main:
    if: github.base_ref == 'main' && startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pytest
        run: pip install pytest

      - name: Find all challenge directories
        id: all-challenges
        run: |
          all_challenges=$(find . -type d -name tests -path "./*/*/tests" 2>/dev/null | sed 's|/tests$||' | tr '\n' ' ')
          echo "challenges=$all_challenges" >> $GITHUB_OUTPUT

      - name: Run all tests
        run: |
          set -e
          for challenge in ${{ steps.all-challenges.outputs.challenges }}; do
            if [ -d "$challenge/tests" ]; then
              echo "Running tests for $challenge"
              (cd "$challenge" && pytest tests/)
            fi
          done